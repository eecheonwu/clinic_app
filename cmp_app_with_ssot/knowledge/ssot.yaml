sync_rules:

  architecture_change:
    requires_ADR: true

  api_change:
    update:
      - knowledge/system/services.md
      - knowledge/architecture/C4/containers.md
      - knowledge/architecture/C4/components.md

  schema_change:
    update:
      - knowledge/system/data-models.md
      - knowledge/architecture/C4/components.md

  implementation_change:
    requires_review: true

  new_provider_or_integration:
    update:
      - knowledge/architecture/ADR/ (new ADR required)
      - knowledge/system/services.md
      - knowledge/architecture/C4/system-context.md

  next_adrs:
