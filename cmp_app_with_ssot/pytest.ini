[tool:pytest]
# CMP Backend Test Configuration
# Task 6.1: Backend Unit Tests

testpaths = tests
pythonpath = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Async support
asyncio_mode = auto

# Coverage configuration
addopts = 
    --strict-markers
    --strict-config
    --cov=src/backend
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-fail-under=80
    -ra

# Markers
markers =
    unit: Unit tests for individual functions/methods
    integration: Integration tests with database/API
    security: Security and RBAC tests
    concurrency: Concurrency and race condition tests
    slow: Tests that take longer to run

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning