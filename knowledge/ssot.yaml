project:
  name: Clinic Modernization Platform (CMP)

ssot_version: 1.0
last_synced: 2026-06-12

authority:

  requirements:
    source:
      - SRD v1.3 (Approved, 2026-06-04)
    knowledge_file: knowledge/product/requirements.md

  architecture:
    source:
      - ADR-001 (PostgreSQL — Accepted)
      - ADR-002 (React PWA — Accepted)
      - ADR-003 (Column Encryption — Accepted)
      - ADR-004 (Notification Failover — Accepted)
      - C4 Architecture Models (2026-06-04)
    knowledge_files:
      - knowledge/architecture/ADR/ADR-001-postgresql-primary-datastore.md
      - knowledge/architecture/ADR/ADR-002-react-pwa-client.md
      - knowledge/architecture/ADR/ADR-003-application-level-column-encryption.md
      - knowledge/architecture/ADR/ADR-004-pluggable-notification-failover.md
      - knowledge/architecture/C4/system-context.md
      - knowledge/architecture/C4/containers.md
      - knowledge/architecture/C4/components.md

  evaluation:
    source:
      - Technology Evaluation (2026-06-04)
    knowledge_file: knowledge/architecture/evaluation/tech-evaluation.md

  system:
    source:
      - Technical Specification v1.0 (Draft, 2026-06-04)
    knowledge_files:
      - knowledge/system/overview.md
      - knowledge/system/services.md
      - knowledge/system/data-models.md

sync_rules:

  architecture_change:
    requires_ADR: true

  api_change:
    update:
      - knowledge/system/services.md
      - knowledge/architecture/C4/containers.md
      - knowledge/architecture/C4/components.md

  schema_change:
    update:
      - knowledge/system/data-models.md
      - knowledge/architecture/C4/components.md

  implementation_change:
    requires_review: true

  new_provider_or_integration:
    update:
      - knowledge/architecture/ADR/ (new ADR required)
      - knowledge/system/services.md
      - knowledge/architecture/C4/system-context.md

next_adrs:
  next_id: ADR-005
